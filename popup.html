<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 注入器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <img src="icons/icon48.png" alt="logo" class="logo">
        <h1>HTML 注入器</h1>
      </div>
      <span class="version" id="version">v0.0.0</span>
    </div>

    <!-- 更新提示（默认隐藏，避免 JS 未加载时显示无意义链接） -->
    <div class="update-notice" id="updateNotice" style="display:none;">
      <span>发现新版本，点击</span>
      <a href="javascript:void(0);" id="updateLink">下载更新</a>
    </div>

    <!-- 开关 -->
    <div class="switch-row">
      <label class="switch">
        <input type="checkbox" id="enabledToggle">
        <span class="slider"></span>
      </label>
      <span class="switch-label" id="switchLabel">已关闭</span>
    </div>

    <!-- HTML 代码输入 -->
    <div class="code-section">
      <label class="section-title" for="htmlCode">HTML 代码</label>
      <textarea id="htmlCode" placeholder="在此输入要插入到 head 的 HTML 代码&#10;例如：&#10;<meta name=&quot;author&quot; content=&quot;my name&quot;>&#10;<style>body { background: #f0f0f0; }</style>&#10;<script>console.log('injected!');</script>" rows="10"></textarea>
    </div>

    <!-- 注入时机 -->
    <div class="option-section">
      <label class="section-title">注入时机</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="timing" value="immediate" checked>
          <span>立即注入（页面开始加载时注入）</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="timing" value="dom_ready">
          <span>DOM 就绪后注入（页面加载完成后注入）</span>
        </label>
      </div>
    </div>

    <!-- 置顶显示 -->
    <div class="option-section">
      <label class="section-title">置顶显示</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="checkbox" id="zindexBoost" checked>
          <span>置顶注入内容（高 z-index，防止被网站 UI 遮挡）</span>
        </label>
      </div>
    </div>

    <!-- 危险功能警告 -->
    <div class="warning-notice">
      <span>此扩展会将自定义 HTML/JS 代码注入到所有网页。请在信任的代码和环境中使用，避免注入来源不明的代码。</span>
    </div>

    <!-- 保存状态 -->
    <div class="status-row">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn-save" id="saveBtn">手动保存</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
